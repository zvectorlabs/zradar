name: Bug report
description: Something is broken or behaving unexpectedly
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. The more detail you can provide, the faster we can reproduce and fix it.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I send OTLP spans with X attribute, zradar crashes / returns wrong data / ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps or code snippet that triggers the bug.
      placeholder: |
        1. Start zradar with `docker compose up -d`
        2. Send a span with `otel-cli span --name test ...`
        3. Query via `GET /api/v1/traces`
        4. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: zradar version
      placeholder: "v0.3.1 or git SHA"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment mode
      options:
        - Docker Compose (local)
        - Docker Compose (remote)
        - Binary (direct)
        - Kubernetes / Helm
        - Other
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant config or environment
      description: Paste your `config.toml` (redact secrets) and any relevant env vars.
      render: toml

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: text

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: I am running the latest release or a recent main build
          required: false
