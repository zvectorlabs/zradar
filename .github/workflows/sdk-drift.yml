name: SDK version drift check

on:
  schedule:
    - cron: '0 9 * * 1'   # Monday 9am UTC
  workflow_dispatch:       # manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check SDK versions
        id: drift
        run: |
          python3 scripts/check_sdk_versions.py --format json > drift.json
          python3 scripts/check_sdk_versions.py --format table
          # Determine whether any drift was found and surface it as a step output.
          python3 - <<'EOF'
          import json, sys, os

          with open('drift.json') as fh:
              data = json.load(fh)

          has_drift = any(
              pkg['status'] == 'DRIFT'
              for fw_packages in data.values()
              for pkg in fw_packages
          )

          output_file = os.environ.get('GITHUB_OUTPUT', '')
          line = f'drift_found={str(has_drift).lower()}\n'
          if output_file:
              with open(output_file, 'a') as out:
                  out.write(line)
          else:
              print(line, end='')
          EOF
        continue-on-error: true

      - name: Open or update drift issue
        if: steps.drift.outputs.drift_found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const drift = JSON.parse(fs.readFileSync('drift.json', 'utf8'));

            // Build issue body table.
            let body = '## SDK Version Drift Detected\n\n';
            body += 'The following example dependencies have newer versions available:\n\n';
            body += '| Framework | Package | Pinned | Latest |\n';
            body += '|-----------|---------|--------|--------|\n';
            for (const [fw, packages] of Object.entries(drift)) {
              for (const pkg of packages) {
                if (pkg.status === 'DRIFT') {
                  body += `| ${fw} | ${pkg.package} | ${pkg.pinned} | ${pkg.latest} |\n`;
                }
              }
            }
            body += '\n\nUpdate the pinned versions in each `pyproject.toml` / `package.json`';
            body += ' and re-run `just example-test-all` to validate.\n';
            body += '\n_Auto-generated by the sdk-drift workflow_';

            // Find an existing open issue with the sdk-drift label.
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'sdk-drift',
              state: 'open',
            });

            if (issues.data.length > 0) {
              // Update the first matching issue in-place.
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body,
              });
              core.info(`Updated existing drift issue #${issues.data[0].number}`);
            } else {
              // Open a new issue.
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'chore: SDK version drift in examples',
                body,
                labels: ['sdk-drift', 'dependencies', 'chore'],
              });
              core.info(`Opened new drift issue #${created.data.number}`);
            }
