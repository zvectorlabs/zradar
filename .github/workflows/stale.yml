name: Stale issues and PRs

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 45
          days-before-close: 15
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >
            This issue has been open for 45 days without activity. It will be closed
            in 15 days unless there is further discussion. If this is still relevant,
            please leave a comment or remove the `stale` label.
          stale-pr-message: >
            This pull request has been open for 45 days without activity. It will be
            closed in 15 days unless there is further discussion. If you are still
            working on this, please leave a comment or remove the `stale` label.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen if this is still relevant.
          close-pr-message: >
            Closing due to inactivity. Feel free to reopen or open a new PR if you
            resume work on this.
          exempt-issue-labels: "pinned,security,rfc,good first issue,help wanted"
          exempt-pr-labels: "pinned,security"
          exempt-all-milestones: true
