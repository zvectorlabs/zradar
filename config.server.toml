# zradar Server Configuration (Ingestion Tier - No Workers)
# This server receives OTLP data and queues jobs for workers
#
# To run OTLP on port 8002: set otlp_port = 8002 below, or env OTLP_PORT=8002
# To run Admin API on 8002: set admin_api_port = 8002 under [admin_api], or env QUERY_API_PORT=8002

otlp_port = 4317
query_api_port = 8080
batch_size = 1000
batch_timeout_seconds = 10

[postgres]
max_connections = 20

[admin_api]
jwt_secret = "dev-jwt-secret-change-in-production"
jwt_expiry_hours = 24
admin_api_port = 8080

[auth]
enabled = true
type = "api-key"
cache_ttl_seconds = 300
# Set to false to make OTLP gRPC (protobuf) open (no API key required). Default: true.
# otlp_require_api_key = false

[ingestor]
queue_type = "postgres"  # or "hybrid" for Redis
storage_type = "local"   # or "s3" for production

[ingestor.storage.local]
path = "/app/data/trace-batches"

# Uncomment for S3 storage
# [ingestor.storage.s3]
# bucket = "my-traces-bucket"
# region = "us-east-1"

# Uncomment for hybrid queue with Redis
# [ingestor.redis]
# url = "redis://redis:6379"

