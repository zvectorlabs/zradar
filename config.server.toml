# zradar server configuration (single-tier: OTLP ingestion + Admin API).
#
# - OTLP_PORT      env var overrides otlp_port
# - QUERY_API_PORT env var overrides query_api_port

otlp_port = 4317
query_api_port = 8080
batch_size = 1000
batch_timeout_seconds = 10

[postgres]
max_connections = 20

[admin_api]
jwt_secret = "dev-jwt-secret-change-in-production"
jwt_expiry_hours = 24
admin_api_port = 8080

[auth]
enabled = true
type = "api-key"
cache_ttl_seconds = 300
# Set to false to make OTLP gRPC open (no API key required). Default: true.
# otlp_require_api_key = false

[ingestor]
storage_type = "local"   # or "s3" for production

[ingestor.storage.local]
path = "/app/data/trace-batches"

# Uncomment for S3 storage
# [ingestor.storage.s3]
# bucket = "my-traces-bucket"
# region = "us-east-1"
