# zradar server configuration (single-tier: OTLP ingestion + Admin API).
#
# Used by docker-compose.yml for development.
# Auth: standalone — static API keys from [[api_keys]] below.
#
# - OTLP_PORT      env var overrides otlp_port
# - QUERY_API_PORT env var overrides query_api_port

otlp_port      = 4317
query_api_port = 8081
batch_size     = 1000
batch_timeout_seconds = 10

[postgres]
max_connections = 20

# Authentication: standalone — validate tokens against the [[api_keys]] list.
[auth]
# mode = "standalone"  # default

# Set to false to allow OTLP without a key (open ingest). Default: true.
# otlp_require_api_key = false

[[api_keys]]
key        = "zk_dev_local"
workspace_id = "00000000-0000-0000-0000-000000000000"
name       = "local dev"

[ingestor]
storage_type = "local"

[ingestor.storage.local]
path = "/app/data/trace-batches"

# Uncomment for S3 storage:
# [ingestor.storage.s3]
# bucket = "my-traces-bucket"
# region = "us-east-1"
