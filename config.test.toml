# zradar test configuration
# This config is used by functional tests with isolated test databases

# OTLP gRPC port for tests
otlp_port = 9016

# OTLP/HTTP port for tests (must match TEST_OTLP_HTTP_URL in test script).
# Use an isolated port — not 4318 (local dev default).
otlp_http_port = 9019

# Admin API port (must match TEST_API_URL in test script; loader reads root-level key)
admin_api_port = 9015

# Query/Admin gRPC ports — avoid clashing with local dev defaults (8081/8082)
query_grpc_port = 9017
admin_grpc_port = 9018

# Batch configuration
batch_size = 1000
batch_timeout_seconds = 10

# PostgreSQL configuration (Control Plane) - Test Database
# Uses port 9011 mapped from docker-compose.test.yml
[postgres]
max_connections = 80

# Admin API configuration - Test port 9015
[admin_api]
jwt_secret = "test-secret-key-for-functional-tests-only"
jwt_expiry_hours = 24

# Authentication configuration
[auth]
enabled = true
cache_ttl_seconds = 300
# TEST ONLY: after validating the single static API key, accept x-tenant-id and
# x-project-id as simulated API-key context. Do not enable outside functional/E2E
# test configs.
allow_test_header_context = true

# Config-based API key for functional tests (matches TEST_API_KEY default)
# Tests use this one API key and pass unique x-tenant-id/x-project-id values for isolation.
[[api_keys]]
key = "zk_test_default"
workspace_id = "00000000-0000-0000-0000-000000000000"
name = "functional-test-key"


# Ingestor configuration
[ingestor]

# WAL is always on (no direct ingest path). Use a short flush interval so the
# durable→Parquet propagation completes quickly; functional tests poll the query
# APIs (see DEFAULT_POLL_TIMEOUT) and succeed as soon as the flush lands.
[ingestor.wal]
flush_interval_ms = 25

[ingestor.storage]
parquet_data_dir = "./data-test/parquet-files"

# Parquet / lifecycle settings for tests.
# Write buffer and compactor are disabled so data is written immediately and
# tests don't have to wait for a 30-second flush interval to expire.
[ingestor.storage.parquet]
write_buffer_enabled = false
compaction_enabled = false
memory_cache_enabled = false
fsync_before_rename = false
cache_dir = "./data-test/parquet-cache"


# Auto-migrations for test environment
[migrations]
auto_migrate = true

