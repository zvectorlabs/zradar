# zradar Worker Configuration (Processing Tier)
# Workers process queued jobs and write to ClickHouse

[clickhouse]
url = "http://clickhouse:8123"
user = "zradar"
password = "clickhouse_password_1764087933"
database = "telemetry"
max_connections = 10

[postgres]
max_connections = 20

[ingestor]
queue_type = "postgres"  # Must match server config
storage_type = "local"   # Must match server config

[ingestor.storage.local]
path = "/app/data/trace-batches"

# Uncomment for S3 storage (must match server)
# [ingestor.storage.s3]
# bucket = "my-traces-bucket"
# region = "us-east-1"

# Uncomment for hybrid queue with Redis (must match server)
# [ingestor.redis]
# url = "redis://redis:6379"

[workers]
num_workers = 8

