[graph]
targets = []

# ── licenses ──────────────────────────────────────────────────────────────────
# Licenses not in this list are denied. GPL/AGLP are excluded by omission.
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
    "CDLA-Permissive-2.0",
    "OpenSSL",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.8
exceptions = []

# ── security advisories ───────────────────────────────────────────────────────
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore = [
    { id = "RUSTSEC-2024-0436" },
    { id = "RUSTSEC-2024-0370" },
    { id = "RUSTSEC-2024-0384" },
    { id = "RUSTSEC-2025-0134" },
    { id = "RUSTSEC-2024-0363" },
    { id = "RUSTSEC-2026-0002" },
]

# ── dependency bans ───────────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "warn"
deny = []

# ── sources ───────────────────────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
