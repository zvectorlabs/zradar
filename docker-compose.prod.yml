services:
  postgres:
    image: postgres:17-alpine
    container_name: zradar-postgres-prod
    environment:
      POSTGRES_USER: zradar
      POSTGRES_PASSWORD: password
      POSTGRES_DB: zradar
    ports:
      - "5432:5432"
    volumes:
      - zradar_pg_data:/var/lib/postgresql/data

  zradar:
    image: ghcr.io/zvectorlabs/zradar:latest
    container_name: zradar-server-prod
    environment:
      DATABASE_URL: postgres://zradar:password@postgres:5432/zradar
      AUTO_MIGRATE: true
    ports:
      - "4317:4317" # OTLP gRPC
      - "8081:8081" # Admin API
    depends_on:
      - postgres

volumes:
  zradar_pg_data:
