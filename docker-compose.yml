# Development Environment (Default)
# This is optimized for local development with hot reload
# Usage: just dev  OR  docker-compose up
#
# Architecture: PostgreSQL metadata + local Parquet telemetry
# - Control plane and metadata stored in PostgreSQL
# - Centralized migration system auto-runs on server startup
# - Set AUTO_MIGRATE=true to enable automatic migrations

services:
  # PostgreSQL - All data storage
  postgres:
    image: postgres:17-alpine
    container_name: zradar-postgres
    environment:
      POSTGRES_DB: zradar
      POSTGRES_USER: zradar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432" # Direct PostgreSQL access
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Note: Migrations are embedded in the application (no manual mounting needed)
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U zradar" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zradar

  # zradar server with hot reload (Development)
  zradar:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: zradar-server
    environment:
      DATABASE_URL: postgres://zradar:${POSTGRES_PASSWORD:-dev_password}@postgres:5432/zradar

      RUST_LOG: ${RUST_LOG:-debug,zradar=trace}
      RUST_BACKTRACE: 1

      AUTO_MIGRATE: ${AUTO_MIGRATE:-true}

      STORAGE_TYPE: ${STORAGE_TYPE:-local}

      OTLP_PORT: 4317
      QUERY_API_PORT: 8081
    ports:
      - "4317:4317" # OTLP gRPC
      - "8081:8081" # Admin API
    volumes:
      # Mount source for hot reload
      - ./crates:/app/crates:ro
      - ./test_functional:/app/test_functional:ro
      - ./Cargo.toml:/app/Cargo.toml:ro
      - ./Cargo.lock:/app/Cargo.lock:rw
      - ./config.server.toml:/app/config.toml:ro
      - ./data/trace-batches:/app/data/trace-batches
      # Note: Migrations are embedded in the application binary
      # The centralized migration system auto-discovers and applies them
      # Cargo caches for faster builds
      - cargo_cache:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - target_cache:/app/target
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zradar
    command: cargo watch --poll -x 'run --bin zradar'

networks:
  zradar:
    driver: bridge

volumes:
  # Cargo caches as Docker volumes for better performance
  cargo_cache:
  cargo_git:
  target_cache: # Note: Database volumes are mapped to ./data/ directory for persistence

  pg_data:
